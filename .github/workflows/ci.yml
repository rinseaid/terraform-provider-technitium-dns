name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests with coverage
        run: go test ./... -v -count=1 -coverprofile=coverage-unit.out -covermode=atomic

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.out

  acceptance-test:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    services:
      technitium:
        image: technitium/dns-server:latest
        ports:
          - 5380:5380
        env:
          DNS_SERVER_DOMAIN: dns-server
          DNS_SERVER_ADMIN_PASSWORD: admin
        options: >-
          --health-cmd "curl -sf http://localhost:5380/api/user/login?user=admin&pass=admin || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Wait for Technitium to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:5380/api/user/login?user=admin&pass=admin" > /dev/null 2>&1; then
              echo "Technitium DNS Server is ready"
              exit 0
            fi
            echo "Waiting for Technitium... ($i/30)"
            sleep 2
          done
          echo "Technitium DNS Server failed to start"
          exit 1

      - name: Run acceptance tests with coverage
        env:
          TF_ACC: "1"
          TECHNITIUM_SERVER_URL: http://localhost:5380
          TECHNITIUM_USERNAME: admin
          TECHNITIUM_PASSWORD: admin
        run: go test ./... -v -count=1 -timeout 30m -coverprofile=coverage-acc.out -covermode=atomic

      - name: Upload acceptance test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-acc
          path: coverage-acc.out

  coverage:
    runs-on: ubuntu-latest
    needs: [acceptance-test]
    if: always() && needs.acceptance-test.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge coverage profiles
        run: |
          go install github.com/wadey/gocovmerge@latest
          gocovmerge coverage-unit.out coverage-acc.out > coverage-merged.out

      - name: Display coverage summary
        run: go tool cover -func=coverage-merged.out

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage-merged.out -o coverage.html

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-merged.out
            coverage.html

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o terraform-provider-technitium
