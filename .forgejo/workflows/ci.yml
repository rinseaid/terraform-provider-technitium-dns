name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -count=1 -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -1

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o /dev/null .

  acceptance:
    runs-on: ubuntu-latest
    needs: [lint, unit, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start Technitium DNS Server
        run: |
          docker rm -f technitium 2>/dev/null || true
          docker run -d --name technitium \
            -p 5380:5380 \
            -e DNS_SERVER_DOMAIN=test.local \
            -e DNS_SERVER_ADMIN_PASSWORD=admin \
            technitium/dns-server:latest

      - name: Wait for Technitium API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5380/api/user/login -d 'user=admin&pass=admin' | grep -q '"status":"ok"'; then
              echo "Technitium API is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Technitium failed to start"
          docker logs technitium
          exit 1

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          TECHNITIUM_SERVER_URL: http://localhost:5380
          TECHNITIUM_USERNAME: admin
          TECHNITIUM_PASSWORD: admin
        run: go test -count=1 -v -timeout 30m -coverprofile=coverage-acc.out -covermode=atomic ./...

      - name: Show acceptance coverage
        if: always()
        run: |
          if [ -f coverage-acc.out ]; then
            go tool cover -func=coverage-acc.out | tail -1
          fi

      - name: Stop Technitium
        if: always()
        run: docker rm -f technitium 2>/dev/null || true
