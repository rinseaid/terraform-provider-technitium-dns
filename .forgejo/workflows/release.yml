name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start Technitium DNS Server
        run: |
          docker rm -fv technitium-release 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
          docker run -d --name technitium-release \
            --tmpfs /etc/dns \
            -p 15380:5380 \
            -e DNS_SERVER_DOMAIN=test.local \
            -e DNS_SERVER_ADMIN_PASSWORD=admin \
            technitium/dns-server:latest

      - name: Wait for Technitium API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:15380/api/user/login -d 'user=admin&pass=admin' | grep -q '"status":"ok"'; then
              echo "Technitium API is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Technitium failed to start"
          docker logs technitium-release
          exit 1

      - name: Run full test suite
        env:
          TF_ACC: "1"
          TECHNITIUM_SERVER_URL: http://localhost:15380
          TECHNITIUM_USERNAME: admin
          TECHNITIUM_PASSWORD: admin
        run: go test -count=1 -v -timeout 30m ./...

      - name: Stop Technitium
        if: always()
        run: docker rm -fv technitium-release 2>/dev/null || true

  goreleaser:
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY != ''
        id: import_gpg
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --list-keys --with-colons | awk -F: '/^fpr/ {print $10; exit}')
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest

      - name: Set release remote
        run: git remote set-url origin https://forgejo.rinseaid.net/rinseaid/terraform-provider-technitium-dns.git

      - name: Run GoReleaser
        run: |
          goreleaser release --clean --release-notes=RELEASE_NOTES.md ${{ steps.import_gpg.outputs.fingerprint == '' && '--skip=sign' || '' }}
        env:
          GITEA_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ""
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
