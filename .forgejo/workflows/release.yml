name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start Technitium DNS Server
        run: |
          docker run -d --name technitium \
            -p 5380:5380 \
            -e DNS_SERVER_DOMAIN=test.local \
            -e DNS_SERVER_ADMIN_PASSWORD=admin \
            technitium/dns-server:latest

      - name: Wait for Technitium API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5380/api/user/login -d 'user=admin&pass=admin' | grep -q '"status":"ok"'; then
              echo "Technitium API is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Technitium failed to start"
          docker logs technitium
          exit 1

      - name: Run full test suite
        env:
          TF_ACC: "1"
          TECHNITIUM_SERVER_URL: http://localhost:5380
          TECHNITIUM_USERNAME: admin
          TECHNITIUM_PASSWORD: admin
        run: go test -count=1 -v -timeout 30m ./...

      - name: Stop Technitium
        if: always()
        run: docker rm -f technitium 2>/dev/null || true

  goreleaser:
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY != ''
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes=RELEASE_NOTES.md ${{ steps.import_gpg.outputs.fingerprint == '' && '--skip=sign' || '' }}
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
